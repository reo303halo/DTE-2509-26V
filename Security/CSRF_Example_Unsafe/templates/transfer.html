{% extends "base.html" %}

{% block content %}
<h2>Transfer Money</h2>

{% if message %}
    <p style="color: green;">{{ message }}</p>
{% endif %}

<p>Current Balance: ${{ balance }}</p>

<form method="POST">
    <p>To <input type="text" name="to"></p>
    <p>Amount <input type="number" name="amount"></p>
    <p><input type="submit" value="Send"></p>
</form>
{% endblock %}
